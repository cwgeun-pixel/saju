<!-- 이메일 인증 후 리디렉션 처리 페이지 -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인증 처리 중 — Trinity of Destiny</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { background:#0A0D1A; color:#E8E0CC; font-family:'Noto Sans KR',sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .icon { font-size:3rem; margin-bottom:1rem; }
    h2 { font-family:'Cinzel',serif; color:#C9A84C; margin-bottom:.6rem; }
    p { color:rgba(232,224,204,0.6); font-size:.9rem; }
    .spinner { width:32px; height:32px; border:3px solid rgba(201,168,76,0.2);
               border-top-color:#C9A84C; border-radius:50%; animation:spin 1s linear infinite; margin:1.5rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div>
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">인증 처리 중...</h2>
  <p id="desc">잠시만 기다려 주세요.</p>
  <div class="spinner" id="spinner"></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(
    'https://smqekqdlkkqagzrvtnmh.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtcWVrcWRsa2txYWd6cnZ0bm1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDkzODcsImV4cCI6MjA5NjE4NTM4N30.VomC09MBc9vEs9A-vZIiwM_LAoUrODXRZHFAX0CEvjc'
  );

  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');

  // Supabase가 hash로 token 전달하는 경우 처리
  const { data: { session }, error } = await supabase.auth.getSession();

  if (error) {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = '인증 실패';
    document.getElementById('desc').textContent = error.message;
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  if (type === 'recovery') {
    // 비밀번호 재설정 → 재설정 페이지로
    document.getElementById('icon').textContent = '🔑';
    document.getElementById('title').textContent = '비밀번호 재설정';
    document.getElementById('desc').textContent = '새 비밀번호를 입력하세요.';
    document.getElementById('spinner').style.display = 'none';
    // TODO: 비밀번호 재설정 폼 표시
    setTimeout(() => window.location.href = './auth.html', 2000);
    return;
  }

  if (session) {
    document.getElementById('icon').textContent = '✅';
    document.getElementById('title').textContent = '인증 완료!';
    document.getElementById('desc').textContent = '잠시 후 대시보드로 이동합니다.';
    setTimeout(() => window.location.href = './dashboard.html', 1500);
  } else {
    document.getElementById('icon').textContent = '✅';
    document.getElementById('title').textContent = '이메일 인증 완료!';
    document.getElementById('desc').textContent = '로그인 페이지로 이동합니다.';
    setTimeout(() => window.location.href = './auth.html', 1500);
  }
</script>
</body>
</html>
