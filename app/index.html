<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <base href="/app/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>혼천 · 사주 · 자미두수 · 천궁도 계산기</title>
    <meta
      name="description"
      content="브라우저에서 안전하게 계산하는 사주, 자미두수, 천궁도 계산기입니다."
    />
    <meta property="og:title" content="혼천 · 사주 · 자미두수 · 천궁도 계산기" />
    <meta
      property="og:description"
      content="브라우저에서 안전하게 계산하는 사주, 자미두수, 천궁도 계산기입니다."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- 랜딩페이지 홈 버튼 + 디자인 오버라이드 -->
    <style>
      /* ===== 홈 버튼 ===== */
      #honcheon-home-btn {
        position: fixed;
        top: 14px;
        left: 16px;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(5,6,20,0.85);
        border: 1px solid rgba(201,168,76,0.4);
        border-radius: 8px;
        padding: 7px 16px;
        color: #c9a84c;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-decoration: none;
        backdrop-filter: blur(12px);
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        font-family: 'Pretendard', sans-serif;
      }
      #honcheon-home-btn:hover {
        background: rgba(201,168,76,0.15);
        border-color: rgba(201,168,76,0.7);
        color: #e8d5a3;
      }
      #honcheon-home-btn svg {
        width: 14px; height: 14px;
        flex-shrink: 0;
      }
      #honcheon-home-btn img.logo-emblem {
        width: 26px; height: 26px;
        object-fit: contain;
        flex-shrink: 0;
        filter: drop-shadow(0 0 4px rgba(201,168,76,0.5));
      }

      /* ===== 랜딩페이지 톤: 딥 네이비 + 골드 + 퍼플 ===== */

      /* 전체 배경 */
      html, body, #root {
        background: #050614 !important;
        font-family: 'Pretendard', 'Inter', sans-serif !important;
      }

      /* CSS 변수 오버라이드 */
      .dark {
        --background: 240 95% 3% !important;
        --foreground: 38 50% 92% !important;
        --card: 240 70% 6% !important;
        --card-foreground: 38 50% 92% !important;
        --popover: 240 70% 7% !important;
        --popover-foreground: 38 50% 92% !important;
        --primary: 38 60% 55% !important;
        --primary-foreground: 240 95% 5% !important;
        --secondary: 240 50% 10% !important;
        --secondary-foreground: 38 40% 85% !important;
        --muted: 240 45% 9% !important;
        --muted-foreground: 240 20% 60% !important;
        --accent: 38 60% 55% !important;
        --accent-foreground: 240 95% 5% !important;
        --border: 240 35% 16% !important;
        --input: 240 45% 10% !important;
        --ring: 38 60% 55% !important;
        --gold: 38 60% 55% !important;
      }

      /* ===== 회전하는 별자리 배경 애니메이션 ===== */
      @keyframes cosmicRotate1 {
        from { transform: translate(-50%,-50%) rotate(0deg); }
        to   { transform: translate(-50%,-50%) rotate(360deg); }
      }
      @keyframes cosmicRotate2 {
        from { transform: translate(-50%,-50%) rotate(0deg); }
        to   { transform: translate(-50%,-50%) rotate(-360deg); }
      }
      @keyframes cosmicRotate3 {
        from { transform: translate(-50%,-50%) rotate(0deg); }
        to   { transform: translate(-50%,-50%) rotate(360deg); }
      }
      @keyframes starTwinkle {
        0%,100% { opacity:0.4; transform:scale(1); }
        50%      { opacity:1;   transform:scale(1.3); }
      }

      /* 회전 링 1 - 외곽 큰 링 (느리게) */
      body::after {
        content: '';
        position: fixed;
        top: 50%; left: 50%;
        width: 900px; height: 900px;
        border: 1px solid rgba(201,168,76,0.07);
        border-radius: 50%;
        transform: translate(-50%,-50%);
        animation: cosmicRotate1 80s linear infinite;
        pointer-events: none;
        z-index: 0;
        box-shadow:
          inset 0 0 60px rgba(201,168,76,0.03),
          0 0 60px rgba(201,168,76,0.03);
      }

      /* 회전 링 2 - 중간 링 (반대 방향) */
      #honcheon-ring2 {
        position: fixed;
        top: 50%; left: 50%;
        width: 640px; height: 640px;
        border: 1px solid rgba(107,33,168,0.12);
        border-radius: 50%;
        transform: translate(-50%,-50%);
        animation: cosmicRotate2 55s linear infinite;
        pointer-events: none;
        z-index: 0;
      }
      #honcheon-ring2::before {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 440px; height: 440px;
        border: 1px solid rgba(201,168,76,0.09);
        border-radius: 50%;
        transform: translate(-50%,-50%);
        animation: cosmicRotate3 35s linear infinite;
      }
      /* 별자리 점들 - 링 위에 배치 */
      #honcheon-ring2::after {
        content: '';
        position: absolute;
        top: -3px; left: 50%;
        width: 6px; height: 6px;
        background: rgba(201,168,76,0.6);
        border-radius: 50%;
        box-shadow:
          0 0 6px rgba(201,168,76,0.8),
          320px 0 4px rgba(107,33,168,0.6),
          160px 276px 4px rgba(201,168,76,0.5),
          -160px 276px 3px rgba(107,33,168,0.4),
          -320px 0 4px rgba(201,168,76,0.5),
          -160px -276px 3px rgba(107,33,168,0.4),
          160px -276px 4px rgba(201,168,76,0.5);
        animation: starTwinkle 3s ease-in-out infinite;
      }

      /* 무료 운세 폼 패널 내부 버튼 아래 브라우저 문구 숨기기 */
      #honcheon-fortune-panel .privacy-note,
      #gf-body + p,
      #honcheon-fortune-panel > div > p:last-child {
        display: none !important;
      }

      /* 명식 산출 폼 버튼 아래 브라우저 문구 숨기기 (하단 footer는 유지) */
      p.text-xs.text-center.text-muted-foreground.flex.items-center.justify-center {
        display: none !important;
      }

      /* 메인 페이지 제목 가운데 정렬 */
      h1 {
        text-align: center !important;
      }
      /* 제목 아래 이탈릭 서브타이틀 가운데 정렬 */
      h1 em, h1 i {
        text-align: center !important;
        display: block !important;
      }
      /* 제목 아래 설명 문구 가운데 정렬 */
      h1 + p, h1 ~ p:first-of-type {
        text-align: center !important;
      }
      /* 제목 컨테이너 가운데 정렬 - flex items-start justify-between → center */
      .flex.items-start.justify-between.gap-4 {
        justify-content: center !important;
        align-items: center !important;
        flex-direction: column !important;
        text-align: center !important;
      }
      /* 다크모드 버튼 위치 유지 */
      .flex.items-start.justify-between.gap-4 > button.shrink-0 {
        position: fixed !important;
        top: 14px !important;
        right: 16px !important;
        z-index: 9999 !important;
      }

      /* 별빛 배경 그라디언트 */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 50% -5%, rgba(107,33,168,0.3) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 85% 85%, rgba(201,168,76,0.1) 0%, transparent 50%),
          radial-gradient(ellipse 40% 35% at 15% 65%, rgba(107,33,168,0.15) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      /* ===== 천구의 이미지 완전 제거 ===== */
      img[src*="armillary"],
      img[alt*="armillary"],
      img[alt*="Armillary"],
      img[alt*="천구"],
      img[src*="armillary-B0L6hZmM"],
      [class*="armillary"],
      [class*="HeroImage"],
      [class*="heroImage"],
      [class*="hero-image"] {
        display: none !important;
      }

      /* 이미지를 담은 왼쪽 컬럼 숨기기 (그리드 레이아웃) */
      [class*="grid"] > *:first-child:has(img),
      [class*="col"] img,
      .lg\\:col-span-1 img,
      [class*="illustration"],
      [class*="Illustration"] {
        display: none !important;
      }

      /* ===== 레이아웃: 폼을 화면 중앙으로 ===== */

      /* 정확한 클래스: grid md:grid-cols-2 → 1컬럼으로 변경 */
      .grid.md\:grid-cols-2 {
        grid-template-columns: 1fr !important;
        justify-items: center !important;
        max-width: 560px !important;
        margin: 0 auto !important;
      }

      /* 왼쪽 이미지 컬럼 숨기기 */
      .grid.md\:grid-cols-2 > *:first-child {
        display: none !important;
      }

      /* 오른쪽 폼 컬럼을 전체 너비로 */
      .grid.md\:grid-cols-2 > *:last-child {
        width: 100% !important;
        max-width: 540px !important;
      }

      /* 전체 페이지 중앙 정렬 */
      #root > div {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
      }

      /* ===== 헤더 텍스트: 골드-퍼플 그라디언트 ===== */
      h1 {
        font-family: 'Cormorant Garamond', serif !important;
        background: linear-gradient(135deg, #e8d5a3 0%, #c9a84c 45%, #9b59b6 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
      }

      /* ===== 결과 페이지 섹션 제목 스타일 ===== */
      #results h2,
      #results h3 {
        font-family: 'Cormorant Garamond', serif !important;
        background: linear-gradient(90deg, #e8d5a3 0%, #c9a84c 60%, #b8860b 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.15rem !important;
        font-weight: 600 !important;
        letter-spacing: 0.04em !important;
        margin-bottom: 0.75rem !important;
      }
      #results h2 {
        font-size: 1.35rem !important;
        letter-spacing: 0.06em !important;
      }

      /* ===== 결과 카드 강화 스타일 ===== */
      #results .rounded-lg.border.bg-card {
        background: linear-gradient(145deg, rgba(8,9,28,0.95) 0%, rgba(12,10,35,0.92) 100%) !important;
        border: 1px solid rgba(201,168,76,0.28) !important;
        border-radius: 16px !important;
        box-shadow:
          0 4px 32px rgba(0,0,0,0.5),
          0 0 0 1px rgba(201,168,76,0.08),
          inset 0 1px 0 rgba(201,168,76,0.12) !important;
        backdrop-filter: blur(20px) !important;
        transition: box-shadow 0.3s, border-color 0.3s !important;
        position: relative !important;
        overflow: hidden !important;
      }
      #results .rounded-lg.border.bg-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
        pointer-events: none;
      }
      #results .rounded-lg.border.bg-card:hover {
        border-color: rgba(201,168,76,0.45) !important;
        box-shadow:
          0 8px 40px rgba(0,0,0,0.6),
          0 0 0 1px rgba(201,168,76,0.15),
          inset 0 1px 0 rgba(201,168,76,0.2) !important;
      }

      /* ===== 사주 명식 테이블 ===== */
      #results table {
        border-collapse: separate !important;
        border-spacing: 0 !important;
        width: 100% !important;
      }
      #results thead tr {
        background: rgba(201,168,76,0.08) !important;
      }
      #results thead th,
      #results thead td {
        color: rgba(201,168,76,0.7) !important;
        font-size: 0.75rem !important;
        letter-spacing: 0.08em !important;
        padding: 8px 12px !important;
        border-bottom: 1px solid rgba(201,168,76,0.15) !important;
      }
      #results tbody tr {
        border-bottom: 1px solid rgba(201,168,76,0.06) !important;
      }
      #results tbody tr:last-child {
        border-bottom: none !important;
      }
      #results tbody td {
        padding: 6px 12px !important;
        color: #e8d5a3 !important;
      }

      /* ===== 사주 천간/지지 글자 배지 강화 ===== */
      #results .bg-el-solid-fire {
        background: linear-gradient(135deg, #c0392b, #e74c3c) !important;
        box-shadow: 0 2px 8px rgba(192,57,43,0.4) !important;
        color: #fff !important;
        border-radius: 8px !important;
        font-weight: 700 !important;
      }
      #results .bg-el-solid-water {
        background: linear-gradient(135deg, #1a5276, #2980b9) !important;
        box-shadow: 0 2px 8px rgba(41,128,185,0.4) !important;
        color: #fff !important;
        border-radius: 8px !important;
        font-weight: 700 !important;
      }
      #results .bg-el-solid-tree {
        background: linear-gradient(135deg, #1e8449, #27ae60) !important;
        box-shadow: 0 2px 8px rgba(39,174,96,0.4) !important;
        color: #fff !important;
        border-radius: 8px !important;
        font-weight: 700 !important;
      }
      #results .bg-el-solid-metal {
        background: linear-gradient(135deg, #7f8c8d, #bdc3c7) !important;
        box-shadow: 0 2px 8px rgba(189,195,199,0.4) !important;
        color: #1a1a2e !important;
        border-radius: 8px !important;
        font-weight: 700 !important;
      }
      #results .bg-el-solid-earth {
        background: linear-gradient(135deg, #7d6608, #d4ac0d) !important;
        box-shadow: 0 2px 8px rgba(212,172,13,0.4) !important;
        color: #1a1a2e !important;
        border-radius: 8px !important;
        font-weight: 700 !important;
      }

      /* ===== 탭 (Saju / Ziwei Doushu / Natal Chart) ===== */
      #results [role="tablist"] {
        background: rgba(5,6,20,0.8) !important;
        border: 1px solid rgba(201,168,76,0.2) !important;
        border-radius: 12px !important;
        padding: 4px !important;
        backdrop-filter: blur(12px) !important;
      }
      #results [role="tab"] {
        border-radius: 8px !important;
        font-family: 'Pretendard', sans-serif !important;
        font-weight: 500 !important;
        letter-spacing: 0.03em !important;
        transition: all 0.2s !important;
        color: rgba(201,168,76,0.5) !important;
      }
      #results [role="tab"][data-state="active"] {
        background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(107,33,168,0.2)) !important;
        color: #c9a84c !important;
        border: 1px solid rgba(201,168,76,0.4) !important;
        box-shadow: 0 2px 12px rgba(201,168,76,0.15) !important;
        -webkit-text-fill-color: #c9a84c !important;
      }
      #results [role="tab"]:hover:not([data-state="active"]) {
        color: rgba(201,168,76,0.75) !important;
        background: rgba(201,168,76,0.06) !important;
      }

      /* ===== 무료 운세 / 멤버십 탭 ===== */
      #honcheon-fortune-tabs {
        background: rgba(5,6,20,0.85) !important;
        border: 1px solid rgba(201,168,76,0.25) !important;
        border-radius: 14px !important;
        padding: 5px !important;
        backdrop-filter: blur(16px) !important;
      }
      #honcheon-fortune-tabs button[data-tab] {
        border-radius: 10px !important;
        font-family: 'Pretendard', sans-serif !important;
        transition: all 0.25s !important;
      }
      #honcheon-fortune-tabs button[data-tab][style*="background:#7c6af7"],
      #honcheon-fortune-tabs button[data-tab][style*="background: rgb(124, 106, 247)"] {
        background: linear-gradient(135deg, #7c6af7, #9b59b6) !important;
        box-shadow: 0 4px 16px rgba(124,106,247,0.35) !important;
        color: #fff !important;
      }

      /* ===== 대운/세운 카드 ===== */
      #results .flex.flex-col.items-center.gap-0\.5 {
        background: rgba(8,9,28,0.6) !important;
        border: 1px solid rgba(201,168,76,0.1) !important;
        border-radius: 10px !important;
        padding: 6px 8px !important;
        transition: all 0.2s !important;
      }
      #results .flex.flex-col.items-center.gap-0\.5:hover {
        background: rgba(201,168,76,0.08) !important;
        border-color: rgba(201,168,76,0.3) !important;
        transform: translateY(-2px) !important;
        box-shadow: 0 4px 16px rgba(201,168,76,0.12) !important;
      }
      /* 현재 대운 강조 (ring-2 클래스) */
      #results .ring-2 {
        background: rgba(201,168,76,0.1) !important;
        border-color: rgba(201,168,76,0.5) !important;
        box-shadow: 0 0 0 2px rgba(201,168,76,0.3), 0 4px 20px rgba(201,168,76,0.2) !important;
      }

      /* ===== 운세 리스트 ===== */
      #results .max-h-80.overflow-y-auto {
        scrollbar-width: thin !important;
        scrollbar-color: rgba(201,168,76,0.3) transparent !important;
      }
      #results .max-h-80.overflow-y-auto::-webkit-scrollbar {
        width: 4px !important;
      }
      #results .max-h-80.overflow-y-auto::-webkit-scrollbar-thumb {
        background: rgba(201,168,76,0.3) !important;
        border-radius: 2px !important;
      }

      /* ===== 특수성 배지 (Special Stars, Pillar Relations) ===== */
      #results .bg-blue-50,
      #results .dark\:bg-blue-950\/40 {
        background: rgba(41,128,185,0.15) !important;
        border: 1px solid rgba(41,128,185,0.3) !important;
        color: #7fb3d3 !important;
        border-radius: 6px !important;
      }
      #results .bg-red-50,
      #results .dark\:bg-red-950\/40 {
        background: rgba(192,57,43,0.15) !important;
        border: 1px solid rgba(192,57,43,0.3) !important;
        color: #e88080 !important;
        border-radius: 6px !important;
      }
      #results span.px-2.py-0\.5.rounded.text-sm {
        padding: 3px 10px !important;
        border-radius: 6px !important;
        font-size: 0.78rem !important;
        font-weight: 500 !important;
        letter-spacing: 0.02em !important;
      }

      /* ===== AI 해석 섹션 ===== */
      #honcheon-ai-panel {
        background: linear-gradient(145deg, rgba(8,9,28,0.95) 0%, rgba(15,10,40,0.92) 100%) !important;
        border: 1px solid rgba(107,33,168,0.35) !important;
        border-radius: 16px !important;
        box-shadow:
          0 4px 32px rgba(0,0,0,0.5),
          0 0 0 1px rgba(107,33,168,0.1),
          inset 0 1px 0 rgba(107,33,168,0.15) !important;
      }
      #honcheon-ai-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(107,33,168,0.5), rgba(201,168,76,0.4), transparent);
        pointer-events: none;
      }
      #honcheon-ai-title {
        font-family: 'Cormorant Garamond', serif !important;
        background: linear-gradient(90deg, #c9a84c 0%, #9b59b6 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.3rem !important;
      }

      /* AI 섹션 선택 버튼 */
      #honcheon-ai-sections button {
        background: rgba(8,9,28,0.7) !important;
        border: 1px solid rgba(201,168,76,0.18) !important;
        color: #c9a84c !important;
        border-radius: 8px !important;
        transition: all 0.2s !important;
        font-size: 0.82rem !important;
      }
      #honcheon-ai-sections button:hover {
        background: rgba(201,168,76,0.12) !important;
        border-color: rgba(201,168,76,0.4) !important;
        box-shadow: 0 2px 12px rgba(201,168,76,0.15) !important;
        transform: translateY(-1px) !important;
      }
      #honcheon-ai-sections button[data-selected="true"],
      #honcheon-ai-sections button.selected,
      #honcheon-ai-sections button[aria-pressed="true"] {
        background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(107,33,168,0.15)) !important;
        border-color: rgba(201,168,76,0.5) !important;
        box-shadow: 0 2px 12px rgba(201,168,76,0.2) !important;
      }

      /* AI 생성 버튼 */
      #honcheon-ai-panel button[id*="generate"],
