<!-- 점성술(Astrology) 5개국어 소개 페이지 -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점성술 (Astrology) — Trinity of Destiny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700;900&family=Cinzel:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--blue:#5B8FD5;--blue-light:#88B4EE;--blue-dim:rgba(91,143,213,0.15);--bg:#0A0D1A;--bg2:#0C1020;--bg3:#111830;--text:#E8E0CC;--text-muted:rgba(232,224,204,0.6);--border:rgba(91,143,213,0.25);--gold:#C9A84C;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;line-height:1.8;}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,13,26,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
    .nav-logo{font-family:'Cinzel',serif;color:var(--blue-light);font-size:1.05rem;letter-spacing:.1em;text-decoration:none;}
    .nav-cta{background:var(--blue);color:#fff;font-weight:700;font-size:.82rem;padding:.5rem 1.3rem;border-radius:2px;text-decoration:none;transition:background .2s;}
    .nav-cta:hover{background:var(--blue-light);color:#0A0D1A;}
    .lang-bar{display:flex;justify-content:center;gap:.5rem;padding:.9rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .lang-btn{font-size:.78rem;padding:.28rem .85rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:inherit;}
    .lang-btn:hover,.lang-btn.active{background:var(--blue-dim);color:var(--blue-light);border-color:var(--blue);}
    .hero{text-align:center;padding:4.5rem 1.5rem 3rem;background:linear-gradient(180deg,#090E20 0%,var(--bg) 100%);border-bottom:1px solid var(--border);}
    .hero-tag{display:inline-block;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.22em;color:var(--blue-light);border:1px solid var(--border);padding:.3rem 1.1rem;border-radius:2px;margin-bottom:1.4rem;}
    .hero h1{font-family:'Noto Serif KR',serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:700;color:var(--blue-light);margin-bottom:.9rem;}
    .hero-sub{font-size:1rem;color:var(--text-muted);max-width:640px;margin:0 auto;}
    .toc{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;padding:1.8rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);}
    .toc a{font-size:.8rem;color:var(--blue-light);border:1px solid var(--border);padding:.28rem .85rem;border-radius:2px;text-decoration:none;transition:background .2s;}
    .toc a:hover{background:var(--blue-dim);}
    main{max-width:880px;margin:0 auto;padding:3rem 1.5rem 5rem;}
    section{margin-bottom:4rem;}
    section+section{border-top:1px solid var(--border);padding-top:4rem;}
    .section-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.22em;color:var(--blue-light);margin-bottom:.5rem;display:block;}
    h2{font-family:'Noto Serif KR',serif;font-size:1.65rem;font-weight:700;color:var(--blue-light);margin-bottom:1.1rem;}
    h3{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:600;color:var(--blue);margin:2rem 0 .7rem;}
    p{color:var(--text-muted);margin-bottom:.9rem;}
    strong{color:var(--text);}
    em{color:var(--blue-light);font-style:normal;}
    .hl{background:var(--bg2);border-left:3px solid var(--blue);padding:1.1rem 1.4rem;margin:1.3rem 0;border-radius:0 4px 4px 0;}
    .hl p{margin:0;}
    .table-wrap{overflow-x:auto;margin:1.3rem 0;}
    table{width:100%;border-collapse:collapse;font-size:.85rem;}
    thead tr{background:var(--bg3);}
    th{font-family:'Noto Serif KR',serif;font-weight:600;color:var(--blue-light);padding:.6rem .85rem;text-align:left;border:1px solid var(--border);}
    td{padding:.55rem .85rem;border:1px solid var(--border);color:var(--text-muted);vertical-align:top;}
    tr:nth-child(even) td{background:rgba(10,16,32,.5);}
    /* 빅3 카드 */
    .big3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.3rem 0;}
    @media(max-width:540px){.big3{grid-template-columns:1fr;}}
    .big3-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.2rem 1rem;text-align:center;}
    .big3-icon{font-size:2rem;display:block;margin-bottom:.4rem;}
    .big3-name{font-family:'Cinzel',serif;font-size:.9rem;color:var(--blue-light);letter-spacing:.08em;display:block;margin-bottom:.4rem;}
    .big3-desc{font-size:.8rem;color:var(--text-muted);}
    /* 행성 그리드 */
    .planet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.8rem;margin:1.2rem 0;}
    .planet-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:.85rem 1rem;}
    .planet-symbol{font-size:1.3rem;display:inline-block;margin-right:.4rem;}
    .planet-name{font-weight:700;color:var(--blue-light);font-size:.92rem;}
    .planet-desc{font-size:.78rem;color:var(--text-muted);margin-top:.3rem;}
    /* 하우스 그리드 */
    .house-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7rem;margin:1.2rem 0;}
    .house-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:.75rem .9rem;}
    .house-num{font-family:'Cinzel',serif;font-size:.75rem;color:var(--blue);letter-spacing:.08em;display:block;margin-bottom:.2rem;}
    .house-name{font-size:.88rem;font-weight:700;color:var(--blue-light);}
    .house-sign{font-size:.72rem;color:var(--blue);margin-left:.3rem;}
    .house-desc{font-size:.75rem;color:var(--text-muted);margin-top:.25rem;}
    /* 애스펙트 */
    .aspect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem;margin:1.2rem 0;}
    .aspect-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:.85rem 1rem;}
    .aspect-deg{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;display:block;margin-bottom:.25rem;}
    .aspect-name{font-size:.88rem;font-weight:700;color:var(--text);display:block;margin-bottom:.2rem;}
    .aspect-desc{font-size:.77rem;color:var(--text-muted);}
    .harmonious{border-color:rgba(92,184,92,0.35);} .harmonious .aspect-deg{color:#5CB85C;}
    .tense{border-color:rgba(232,93,74,0.35);} .tense .aspect-deg{color:#E85D4A;}
    .neutral{border-color:rgba(201,168,76,0.35);} .neutral .aspect-deg{color:var(--gold);}
    /* 시대별 타임라인 */
    .timeline{margin:1.5rem 0;}
    .tl-item{display:flex;gap:1rem;margin-bottom:1.4rem;}
    .tl-dot{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--blue);margin-top:.55rem;}
    .tl-body{}
    .tl-era{font-family:'Cinzel',serif;font-size:.75rem;color:var(--blue-light);letter-spacing:.08em;display:block;margin-bottom:.2rem;}
    .tl-title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.2rem;}
    .tl-text{font-size:.82rem;color:var(--text-muted);}
    /* CTA */
    .cta-box{text-align:center;padding:3rem 1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-top:4rem;}
    .cta-box h2{margin-bottom:.7rem;}
    .cta-box p{margin-bottom:1.8rem;}
    .btn-p{display:inline-block;background:var(--blue);color:#fff;font-weight:700;font-size:.92rem;padding:.8rem 2.3rem;border-radius:2px;text-decoration:none;transition:background .2s;}
    .btn-p:hover{background:var(--blue-light);color:#0A0D1A;}
    .btn-s{display:inline-block;border:1px solid var(--blue);color:var(--blue-light);font-weight:600;font-size:.88rem;padding:.75rem 1.8rem;border-radius:2px;text-decoration:none;margin-left:.9rem;transition:background .2s;}
    .btn-s:hover{background:var(--blue-dim);}
    @media(max-width:460px){.btn-s{margin-left:0;margin-top:.7rem;}}
    footer{text-align:center;padding:1.8rem;font-size:.78rem;color:var(--text-muted);border-top:1px solid var(--border);}
  </style>
</head>

// ── 렌더링 ──────────────────────────────────────────────────
function buildPage(d) {
  document.documentElement.lang = d.htmlLang;
  document.title = d.heroTitle + " — Trinity of Destiny";
  document.getElementById('nav-cta').textContent = d.navCta;

  var tocLinks = d.toc.map(function(t,i){
    return '<a href="#'+d.tocIds[i]+'">'+t+'</a>';
  }).join('');

  var tlHtml = d.timeline.map(function(t){
    return '<div class="tl-item"><div class="tl-dot"></div><div class="tl-body"><span class="tl-era">'+t.era+'</span><div class="tl-title">'+t.title+'</div><div class="tl-text">'+t.text+'</div></div></div>';
  }).join('');

  var sysHtml = d.systems.map(function(s){
    return '<div class="star-card"><span class="star-name" style="color:var(--blue-light);">'+s.name+'</span><span style="font-size:.72rem;color:var(--blue);display:block;margin-bottom:.3rem;">'+s.en+'</span><span class="star-desc">'+s.desc+'</span></div>';
  }).join('');

  var big3Html = d.big3.map(function(b){
    return '<div class="big3-card"><span class="big3-icon">'+b.icon+'</span><span class="big3-name">'+b.name+'</span><span class="big3-desc">'+b.desc+'</span></div>';
  }).join('');

  var planetsHtml = d.planets.map(function(p){
    return '<div class="planet-card"><span class="planet-symbol">'+p.sym+'</span><span class="planet-name">'+p.name+'</span><div class="planet-desc">'+p.desc+'</div></div>';
  }).join('');

  var housesHtml = d.houses.map(function(h){
    return '<div class="house-card"><span class="house-num">'+h.num+'</span><span class="house-name">'+h.name+'<span class="house-sign">'+h.sign+'</span></span><div class="house-desc">'+h.desc+'</div></div>';
  }).join('');

  var hgHtml = d.houseGroups.map(function(g){
    return '<li style="color:var(--text-muted);font-size:.88rem;margin-bottom:.5rem;"><strong style="color:var(--blue-light);">'+g.type+'</strong> — '+g.desc+'</li>';
  }).join('');

  var aspectsHtml = d.aspects.map(function(a){
    return '<div class="aspect-card '+a.cls+'"><span class="aspect-deg">'+a.deg+'</span><span class="aspect-name">'+a.name+'</span><div class="aspect-desc">'+a.desc+'</div></div>';
  }).join('');

  var compHtml = d.comparison.map(function(c){
    return '<tr><td><strong>'+c.domain+'</strong></td><td>'+c.trad+'</td><td>'+c.mod+'</td></tr>';
  }).join('');

  var content = [
    '<div class="hero"><span class="hero-tag">'+d.heroTag+'</span><h1>'+d.heroTitle+'</h1><p class="hero-sub">'+d.heroSub+'</p></div>',
    '<div class="toc">'+tocLinks+'</div>',
    '<main>',

    // 1. 역사
    '<section id="history">',
      '<span class="section-label">'+d.s1Label+'</span>',
      '<h2>'+d.s1Title+'</h2>',
      '<div class="timeline">'+tlHtml+'</div>',
      '<div class="hl"><p>'+d.s1hl+'</p></div>',
    '</section>',

    // 2. 세계 체계
    '<section id="systems">',
      '<span class="section-label">'+d.s2Label+'</span>',
      '<h2>'+d.s2Title+'</h2>',
      '<p>'+d.s2p+'</p>',
      '<div class="planet-grid">'+sysHtml+'</div>',
    '</section>',

    // 3. 천궁도
    '<section id="chart">',
      '<span class="section-label">'+d.s3Label+'</span>',
      '<h2>'+d.s3Title+'</h2>',
      '<p>'+d.s3p+'</p>',
      '<div class="big3">'+big3Html+'</div>',
      '<h3>'+d.s3h2+'</h3>',
      '<div class="planet-grid">'+planetsHtml+'</div>',
    '</section>',

    // 4. 하우스
    '<section id="houses">',
      '<span class="section-label">'+d.s4Label+'</span>',
      '<h2>'+d.s4Title+'</h2>',
      '<p>'+d.s4p+'</p>',
      '<div class="house-grid">'+housesHtml+'</div>',
      '<h3>'+d.s4h2+'</h3>',
      '<ul style="padding-left:1.2rem;margin:.5rem 0;">'+hgHtml+'</ul>',
    '</section>',

    // 5. 애스펙트
    '<section id="aspects">',
      '<span class="section-label">'+d.s5Label+'</span>',
      '<h2>'+d.s5Title+'</h2>',
      '<p>'+d.s5p+'</p>',
      '<div class="aspect-grid">'+aspectsHtml+'</div>',
      '<h3>'+d.s5h2+'</h3><p>'+d.s5p2+'</p>',
    '</section>',

    // 6. 전통 vs 현대
    '<section id="modern">',
      '<span class="section-label">'+d.s6Label+'</span>',
      '<h2>'+d.s6Title+'</h2>',
      '<p>'+d.s6p+'</p>',
      '<div class="table-wrap"><table>',
        '<thead><tr>'+d.thComp.map(function(h){return'<th>'+h+'</th>';}).join('')+'</tr></thead>',
        '<tbody>'+compHtml+'</tbody>',
      '</table></div>',
      '<div class="hl"><p>'+d.s6hl+'</p></div>',
      '<p>'+d.s6p2+'</p>',
    '</section>',

    // CTA
    '<div class="cta-box">',
      '<h2>'+d.ctaTitle+'</h2>',
      '<p>'+d.ctaDesc+'</p>',
      '<a href="./app/" class="btn-p" target="_blank" rel="noopener">'+d.ctaBtn+'</a>',
      '<a href="./" class="btn-s">'+d.ctaBack+'</a>',
    '</div>',
    '</main>',
  ].join('');

  document.getElementById('page-content').innerHTML = content;
  document.getElementById('page-footer').textContent = d.footer;

  // star-card 스타일이 없어서 인라인 추가
  if (!document.getElementById('sc-style')) {
    var s = document.createElement('style');
    s.id = 'sc-style';
    s.textContent = '.star-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:.85rem 1rem;}.star-name{font-weight:700;font-size:.9rem;display:block;margin-bottom:.3rem;}.star-desc{font-size:.78rem;color:var(--text-muted);}';
    document.head.appendChild(s);
  }
}

function setLang(lang) {
  if (!T[lang]) return;
  try { localStorage.setItem('tod_lang', lang); } catch(e){}
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  buildPage(T[lang]);
}

(function() {
  var lang = 'ko';
  try {
    lang = localStorage.getItem('tod_lang') ||
           localStorage.getItem('honcheon.lang') ||
           (navigator.language || 'ko').slice(0,2);
  } catch(e){}
  if (!T[lang]) lang = 'ko';
  setLang(lang);
})();
</script>
</body>
</html>
