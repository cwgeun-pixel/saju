function buildPage(d) {

  document.getElementById('nav-cta').textContent = d.navCta;

  var tocLinks = d.toc.map(function(t,i){
    return '<a href="#'+d.tocIds[i]+'">'+t+'</a>';
  }).join('');

  var pillarsHtml = d.pillars.map(function(p){
    return '<div class="pillar-card"><span class="pname">'+p.name+'</span><span class="pen">'+p.en+'</span><p>'+p.desc+'</p></div>';
  }).join('');

  var stemsHtml = d.stems.map(function(r,i){
    return '<tr>'+(i===0?'<td class="char">'+r[0]+'</td>':'<td class="char">'+r[0]+'</td>')+r.slice(1).map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';
  }).join('');

  var branchesHtml = d.branches.map(function(r){
    return '<tr><td class="char">'+r[0]+'</td>'+r.slice(1).map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';
  }).join('');

  var harmClashHtml = d.harmClash.map(function(r){
    return '<tr>'+r.map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';
  }).join('');

  var elemHtml = d.elements.map(function(e){
    return '<div class="element-card"><span class="kanji '+e.cls+'">'+e.kanji+'</span><span class="ename">'+e.name+'</span><div class="edesc">'+e.desc.replace(/\n/g,'<br>')+'</div></div>';
  }).join('');

  var ssHtml = d.sinshin.map(function(r){
    return '<tr>'+r.map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';
  }).join('');

      '<span class="hero-tag">'+d.heroTag+'</span>',
      '<h1>'+d.heroTitle+'</h1>',
      '<p class="hero-sub">'+d.heroSub+'</p>',
    '</div>',
    '<div class="toc">'+tocLinks+'</div>',
    '<main>',

    // 1. 기원
    '<section id="history">',
      '<span class="section-label">'+d.s1Label+'</span>',
      '<h2>'+d.s1Title+'</h2>',

    '</section>',

    // 2. 구조

      '<span class="section-label">'+d.s2Label+'</span>',

      '<p>'+d.s2p+'</p>',
      '<div class="pillar-grid">'+pillarsHtml+'</div>',
      '<p>'+d.s2p2+'</p>',
    '</section>',

    // 3. 천간

      '<span class="section-label">'+d.s3Label+'</span>',
      '<h2>'+d.s3Title+'</h2><p>'+d.s3p+'</p>',
      '<div class="table-wrap"><table>',
        '<thead><tr>'+d.thCh.map(function(h){return'<th>'+h+'</th>';}).join('')+'</tr></thead>',

function setLang(lang) {
  if (!T[lang]) return;
  try { localStorage.setItem('tod_lang', lang); } catch(e){}
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  buildPage(T[lang]);
}

(function() {
  var lang = 'ko';
  try {
    lang = localStorage.getItem('tod_lang') ||
           localStorage.getItem('honcheon.lang') ||
           (navigator.language || 'ko').slice(0,2);
  } catch(e){}
  if (!T[lang]) lang = 'ko';
  setLang(lang);
})();
