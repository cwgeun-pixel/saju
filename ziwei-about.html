    @media(max-width:480px){.sihua-grid{grid-template-columns:1fr;}}
    .sihua-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:.9rem 1rem;}
    .sihua-name{font-family:'Noto Serif KR',serif;font-size:1.05rem;font-weight:700;display:block;margin-bottom:.25rem;}
    .sihua-desc{font-size:.82rem;color:var(--text-muted);}

    .cta-box p{margin-bottom:1.8rem;}
    .btn-p{display:inline-block;background:var(--pur);color:#fff;font-weight:700;font-size:.92rem;padding:.8rem 2.3rem;border-radius:2px;text-decoration:none;letter-spacing:.05em;transition:background .2s;}

    footer{text-align:center;padding:1.8rem;font-size:.78rem;color:var(--text-muted);border-top:1px solid var(--border);}

      '<h3>'+d.s3h3+'</h3><p>'+d.s3p2+'</p>',
    '</section>',

    // 4. 보좌·살성
    '<section id="aux">',
      '<span class="section-label">'+d.s4Label+'</span>',
      '<h2>'+d.s4Title+'</h2>',
      '<h3>'+d.s4h1+'</h3>',
      '<div class="star-grid">'+g6+'</div>',
      '<h3>'+d.s4h2+'</h3>',
      '<div class="star-grid">'+b6+'</div>',
      '<div class="hl"><p>'+d.s4hl+'</p></div>',
    '</section>',

    // 5. 해석 원리
    '<section id="principles">',
      '<span class="section-label">'+d.s5Label+'</span>',
      '<h2>'+d.s5Title+'</h2>',
      '<h3>'+d.s5h1+'</h3><p>'+d.s5p1+'</p>',
      '<h3>'+d.s5h2+'</h3><p>'+d.s5p2+'</p>',
      '<div class="sihua-grid">'+sihuaHtml+'</div>',
      '<h3>'+d.s5h3+'</h3><p>'+d.s5p3+'</p>',
      '<h3>'+d.s5h4+'</h3><p>'+d.s5p4+'</p>',
    '</section>',

    // 6. 결론
    '<section id="conclusion">',
      '<span class="section-label">'+d.s6Label+'</span>',
      '<h2>'+d.s6Title+'</h2>',
      '<div class="hl"><p>'+d.s6hl+'</p></div>',
      '<p>'+d.s6p+'</p>',
    '</section>',

    // CTA
    '<div class="cta-box">',
      '<h2>'+d.ctaTitle+'</h2>',
      '<p>'+d.ctaDesc+'</p>',
      '<a href="./app/" class="btn-p" target="_blank" rel="noopener">'+d.ctaBtn+'</a>',
      '<a href="./" class="btn-s">'+d.ctaBack+'</a>',
    '</div>',

    '</main>',
  ].join('');

  document.getElementById('page-content').innerHTML = content;
  document.getElementById('page-footer').textContent = d.footer;
}

function setLang(lang) {
  if (!T[lang]) return;
  try { localStorage.setItem('tod_lang', lang); } catch(e){}
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  buildPage(T[lang]);
}

(function() {
  var lang = 'ko';
  try {
    lang = localStorage.getItem('tod_lang') ||
           localStorage.getItem('honcheon.lang') ||
           (navigator.language || 'ko').slice(0,2);
  } catch(e){}
  if (!T[lang]) lang = 'ko';
  setLang(lang);
})();
</script>
